<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<header class="header">

<div class="logo-area">

<h1>🇺🇸 Veterans Day Ticketless Raffle</h1>

<p id="todayDate"></p>

</div>

<div class="header-buttons">

<button id="themeToggle" class="btn btn-secondary">
🌙 Dark Mode
</button>

<button id="presentationMode" class="btn btn-secondary">
🖥 Presentation
</button>

<button id="accessibilityMode" class="btn btn-secondary">
🔍 Large Text
</button>

</div>

</header>

<div id="messageBanner"></div>

<section class="card">

<h2>🔐 Administrator Login</h2>

<input
id="password"
type="password"
placeholder="Enter Admin Password">

</section>  
  
<hr>

<section class="card">
  
<h2>➕ Admin Add Entrant</h2>

<input
  id="adminName"
  placeholder="Entrant Name">

<input
  id="adminTickets"
  type="number"
  min="1"
  value="1"
  placeholder="Tickets">

<button
  onclick="adminAddEntrant()"
  style="
    background:#28a745;
    color:white;
    font-weight:bold;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
  ">
  ➕ Add Entrant
</button>

<div id="adminMessage"></div>

<hr>

</section>

<section class="card">
  
<h2>Total Entrants</h2>
<div id="entrantCount">0</div>
  
<button onclick="loadEntrantCount()">
  Refresh Entrant Count
</button>

<h2>Entrants</h2>
<button onclick="loadEntrants()">
  Show Entrants
</button>

<button onclick="exportEntries()">
  Download Entrants (Excel)
</button>
  
<ul id="entrantList"></ul>

<section class="card draw-card">

<h2>🎉 Daily Drawing</h2>

<button
id="drawButton"
class="btn btn-draw"
onclick="drawWinner()">

🎉 DRAW TODAY'S WINNER 🎉

</button>

<section class="card">
  
<section class="card winner-card">

<h2>🏆 Today's Winner</h2>

<div id="winner" class="winner-name">

No winner yet

</div>

</section>

<section class="card">
  
<h2>Previous Winners</h2>
<ul id="winnerList"></ul>

</section>
  
<section class="card">

<h2>⚙️ Maintenance</h2>

<button
class="btn btn-danger"
onclick="resetRaffle()">

🗑 Reset Today's Raffle

</button>

</section>
  
<script>
async function drawWinner() {
  const password =
    document.getElementById("password").value;

  const res = await fetch("/api/draw", {
    method: "POST",
    headers: { password }
  });

  const data = await res.json();

  if (!res.ok) {
    document.getElementById("winner").innerText =
      data.error || "Error";
    return;
  }

  document.getElementById("winner").innerText =
    data.name;

  loadWinners();
  loadEntrantCount();
  loadEntrants();
  
}

async function loadEntrantCount() {
  const password =
    document.getElementById("password").value;

  const res = await fetch("/api/entries", {
    headers: { password }
  });

  if (!res.ok) return;

  const entries = await res.json();

  document.getElementById("entrantCount").innerText =
    entries.length;
}

async function exportEntries() {
  const password =
    document.getElementById("password").value;

  const res = await fetch(
    "/api/export-entries",
    {
      headers: { password }
    }
  );

  if (!res.ok) {
    alert("Export failed");
    return;
  }

  const blob = await res.blob();

  const url =
    window.URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;
  a.download = "raffle-entries.csv";

  document.body.appendChild(a);
  a.click();
  a.remove();

  window.URL.revokeObjectURL(url);
}
  
async function loadEntrants() {
  const password =
    document.getElementById("password").value;

  const res = await fetch("/api/entries", {
    headers: { password }
  });

  if (!res.ok) {
    alert("Unable to load entrants");
    return;
  }

  const entries = await res.json();

  const list =
    document.getElementById("entrantList");

  list.innerHTML = "";

  entries.forEach(entry => {
    const li = document.createElement("li");
    const enteredAt = new Date(entry.timestamp);

li.textContent =
  `${entry.name} - ${entry.tickets} ticket(s) - ${enteredAt.toLocaleDateString()} ${enteredAt.toLocaleTimeString()}`;
    list.appendChild(li);
  });
}
  
async function loadWinners() {
  const password =
    document.getElementById("password").value;

  const res = await fetch("/api/winners", {
    headers: { password }
  });

  if (!res.ok) return;

  const winners = await res.json();

  const list =
    document.getElementById("winnerList");

  list.innerHTML = "";

  winners.forEach(winner => {
    const li = document.createElement("li");
    li.textContent = winner.name;
    list.appendChild(li);
  });
}

async function resetRaffle() {
  const password =
    document.getElementById("password").value;

  const confirmed = confirm(
    "Are you sure you want to reset the raffle? This will remove all entries and winners."
  );

  if (!confirmed) return;

  const res = await fetch("/api/reset", {
    method: "POST",
    headers: { password }
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "Reset failed");
    return;
  }

  document.getElementById("winner").innerText =
    "Raffle reset successfully";

  document.getElementById("winnerList").innerHTML = "";
  document.getElementById("entrantList").innerHTML = "";
  document.getElementById("entrantCount").innerText = "0";
  
}
</script>

</body>
</html>
