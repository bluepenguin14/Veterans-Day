<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Raffle Admin</h1>

<input id="password"
placeholder="Admin Password">

<h2>Total Entrants</h2>
<div id="entrantCount">0</div>
  
<button onclick="loadEntrantCount()">
  Refresh Entrant Count
</button>

<h2>Entrants</h2>
<button onclick="loadEntrants()">
  Show Entrants
</button>

<button onclick="exportEntries()">
  Download Entrants (Excel)
</button>
  
<ul id="entrantList"></ul>

<button onclick="drawWinner()">
Draw Winner
</button>
  
<h2>Winner</h2>
<div id="winner"></div>

<h2>Previous Winners</h2>
<ul id="winnerList"></ul>

<button onclick="resetRaffle()">
  Reset Raffle
</button>
  
<script>
async function drawWinner() {
  const password =
    document.getElementById("password").value;

  const res = await fetch("/api/draw", {
    method: "POST",
    headers: { password }
  });

  const data = await res.json();

  if (!res.ok) {
    document.getElementById("winner").innerText =
      data.error || "Error";
    return;
  }

  document.getElementById("winner").innerText =
    data.name;

  loadWinners();
  loadEntrantCount();
  loadEntrants();
  
}

async function loadEntrantCount() {
  const password =
    document.getElementById("password").value;

  const res = await fetch("/api/entries", {
    headers: { password }
  });

  if (!res.ok) return;

  const entries = await res.json();

  document.getElementById("entrantCount").innerText =
    entries.length;
}

async function exportEntries() {
  const password =
    document.getElementById("password").value;

  const res = await fetch(
    "/api/export-entries",
    {
      headers: { password }
    }
  );

  if (!res.ok) {
    alert("Export failed");
    return;
  }

  const blob = await res.blob();

  const url =
    window.URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;
  a.download = "raffle-entries.csv";

  document.body.appendChild(a);
  a.click();
  a.remove();

  window.URL.revokeObjectURL(url);
}
  
async function loadEntrants() {
  const password =
    document.getElementById("password").value;

  const res = await fetch("/api/entries", {
    headers: { password }
  });

  if (!res.ok) {
    alert("Unable to load entrants");
    return;
  }

  const entries = await res.json();

  const list =
    document.getElementById("entrantList");

  list.innerHTML = "";

  entries.forEach(entry => {
    const li = document.createElement("li");
    const enteredAt = new Date(entry.timestamp);

li.textContent =
  `${entry.name} - ${entry.tickets} ticket(s) - ${enteredAt.toLocaleDateString()} ${enteredAt.toLocaleTimeString()}`;
    list.appendChild(li);
  });
}
  
async function loadWinners() {
  const password =
    document.getElementById("password").value;

  const res = await fetch("/api/winners", {
    headers: { password }
  });

  if (!res.ok) return;

  const winners = await res.json();

  const list =
    document.getElementById("winnerList");

  list.innerHTML = "";

  winners.forEach(winner => {
    const li = document.createElement("li");
    li.textContent = winner.name;
    list.appendChild(li);
  });
}

async function resetRaffle() {
  const password =
    document.getElementById("password").value;

  const confirmed = confirm(
    "Are you sure you want to reset the raffle? This will remove all entries and winners."
  );

  if (!confirmed) return;

  const res = await fetch("/api/reset", {
    method: "POST",
    headers: { password }
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "Reset failed");
    return;
  }

  document.getElementById("winner").innerText =
    "Raffle reset successfully";

  document.getElementById("winnerList").innerHTML = "";
  document.getElementById("entrantList").innerHTML = "";
  document.getElementById("entrantCount").innerText = "0";
  
}
</script>

</body>
</html>
