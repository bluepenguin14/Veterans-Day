<!DOCTYPE html>
<html>
<head>
  <title>Enter Raffle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<img
  src="raffle-banner.jpg"
  alt="Raffle Banner"
  id="banner">
  
  <h1>Enter Raffle</h1>

  <input id="name" placeholder="Your Name">

<input
  id="tickets"
  type="number"
  min="1"
  value="1"
  placeholder="Number of Tickets">

  <button onclick="enterRaffle()">
    Enter
  </button>

  <div id="msg"></div>

  <script src="app.js"></script>
</body>
</html>
